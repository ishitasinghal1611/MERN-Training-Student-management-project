<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Student Management System</h1>

    <h2>Add Student</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="age" placeholder="Age">
    <input type="text" id="course" placeholder="Course">
    <button onclick="addStudent()">Add Student</button>

    <hr>

    <h2>View All Students</h2>
    <button onclick="getStudents()">Show Students</button>
    <pre id="students"></pre>

    <hr>

    <h2>Update Student</h2>
    <input type="number" id="uid" placeholder="ID">
    <input type="text" id="uname" placeholder="New Name">
    <input type="number" id="uage" placeholder="New Age">
    <input type="text" id="ucourse" placeholder="New Course">
    <button onclick="updateStudent()">Update Student</button>

    <hr>

    <h2>Delete Student</h2>
    <input type="number" id="did" placeholder="ID">
    <button onclick="deleteStudent()">Delete Student</button>
    </div>
    <script src="script.js"></script>

</body>
</html>
